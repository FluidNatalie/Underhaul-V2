[mod-setting-description]
uncl_uh-remove-beacons=Whether to remove the beacon Technology and Items (default:yes)
uncl_uh-remove-belts=Removes belt tiers so you just use one tier the entire game (default:no)
uncl_uh-remove-discharge-defense=Whether to remove the discharge defense equipment and its technology (default:yes)
uncl_uh-remove-combat-robots=Whether to remove combat robots (defenders, distractors, destroyers) and their technologies (default:no)
uncl_uh-squeak-solar-panels=Whether a player can fit between 2 placed solar panels. Makes dealing with solar power easier (default:yes)
uncl_uh-remove-inserters=[Remove Nothing] Will disable the setting \n [Keep Bulk] Will remove only yellow inserters \n [Remove Bulk] Will remove yellow inserters and bulk inserters and replace them with tech upgrades
uncl_uh-remove-assembling-tiers=Removes assembling machine tiers so you just use one tier the entire game (default:no)

